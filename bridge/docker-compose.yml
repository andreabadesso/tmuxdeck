services:
  bridge:
    container_name: tmuxdeck-bridge
    build: .
    network_mode: host
    volumes:
      - ${TMUX_SOCKET_DIR:-/tmp/tmux-1000}:/tmp/tmux-host
      # Mount Docker socket to expose other containers' tmux sessions
      - /var/run/docker.sock:/var/run/docker.sock
      # Host filesystem mounts for tmuxdeck-open file access.
      # Mount host directories under /mnt/host so the bridge can read/write them.
      # - /opt/production:/mnt/host/opt/production:ro
      - /tmp:/mnt/host/tmp
    environment:
      - HOST_UID=${HOST_UID:-1000}
      - HOST_TMUX_SOCKET=/tmp/tmux-host/default
      - DOCKER_SOCKET=/var/run/docker.sock
      # Optional: filter containers by label (e.g. DOCKER_LABEL=tmuxdeck=true)
      # - DOCKER_LABEL=
      # Set when using host filesystem mounts above:
      - HOST_MOUNT_ROOT=/mnt/host
    env_file:
      - .env
    restart: unless-stopped
