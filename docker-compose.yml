services:
  backend:
    build: ./backend
    ports:
      - "${BIND_HOST:-127.0.0.1}:8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - backend-data:/data
      - ./docker/templates:/app/docker/templates:ro
      - ./scripts:/app/scripts:ro
      - /tmp/tmux-${HOST_UID:-1000}:/tmp/tmux-host
    environment:
      - HOST_TMUX_SOCKET=/tmp/tmux-host/default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${BIND_HOST:-127.0.0.1}:3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-data:
